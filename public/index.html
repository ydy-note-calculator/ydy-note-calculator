<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no, user-scalable=no" />
    
    <title>YDY Not Hesaplama - Alparslan Soyak</title>

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-512x512.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="YDY Hesapla" />
    
    <meta name="theme-color" content="#000000" />
  </head>
  <body>
    <noscript>Bu uygulamayı kullanmak için JavaScript'i etkinleştirmeniz gerekir.</noscript>
    
    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
            .then(function(registration) {
              console.log('PWA Motoru devrede. Zırh Kapsamı:', registration.scope);
            })
            .catch(function(error) {
              console.log('PWA Motoru kurulamadı:', error);
            });
        });
      }
    </script>
  </body>
</html>
